<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria AR - mAjoRnext</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Mantenimento della tua grafica perfetta */
        model-viewer {
            --progress-bar-color: #e67e22; 
            position: relative;
            background-color: #1a1a1a;
            width: 100%;
            height: 400px;
            --poster-color: transparent;
        }

        #ar-button {
            background-color: #e67e22;
            border-radius: 50px;
            border: none;
            padding: 15px 30px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 100;
        }

        #ar-button:active {
            background-color: #d35400;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">m<span class="highlight">A</span>jo<span class="highlight">R</span>next</div>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="storia.html">STORIA</a></li>
            <li><a href="gallery.html" class="active">GALLERIA AR</a></li>
            <li><a href="sethlans3.html">SETHLANS 3.0</a></li>
            <li><a href="progetto.html">PROGETTO</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1 class="page-title">GALLERIA <span class="highlight-text">AR</span></h1>
        
        <div class="gallery-container">

    <footer>© 2026 mAjoRnext - Majorana Etruscan ARchaeology</footer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script>
        const hb = document.getElementById('hamburger');
        const nl = document.getElementById('nav-links');
        hb.onclick = () => {
            hb.classList.toggle('active');
            nl.classList.toggle('active');
            document.body.style.overflow = nl.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
